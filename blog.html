<!DOCTYPE html>
<html>
<head>
<style>
body {
    margin: 0;
    font-family: Arial;
}

.container {
    display: flex;
}

/* Sidebar */
.sidebar {
    width: 25%;
    background: #ddd;
    padding: 15px;
}

.sidebar h3 {
    margin-top: 0;
}

.sidebar p {
    cursor: pointer;
}

/* Content */
.content {
    width: 75%;
    padding: 15px;
}

/* Cards */
.card {
    border: 1px solid #000;
    margin-bottom: 10px;
    padding: 10px;
}

.card:hover {
    background: lightblue;
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
<h3>Menu</h3>
<p>Home</p>
<p>Blogs</p>
<p>Contact</p>
</div>

<div class="content">
<h2>Blogs</h2>

<div class="card">Blog 1</div>
<div class="card">Blog 2</div>
<div class="card">Blog 3</div>

</div>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>College Event Registration</title>

    <script>
        function showSummary() {
            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let dept = document.getElementById("dept").value;

            let events = [];
            let checkboxes = document.getElementsByName("event");

            for (let i = 0; i < checkboxes.length; i++) {
                if (checkboxes[i].checked) {
                    events.push(checkboxes[i].value);
                }
            }

            if (events.length == 0) {
                alert("Select at least one event");
                return false;
            }

            document.getElementById("summary").innerHTML =
                "Name: " + name + "<br>" +
                "Email: " + email + "<br>" +
                "Department: " + dept + "<br>" +
                "Events: " + events.join(", ");

            return false;
        }
    </script>
</head>

<body>

<h2>College Event Registration</h2>

<form onsubmit="return showSummary()">

Name:
<input type="text" id="name" required><br><br>

Email:
<input type="email" id="email" required><br><br>

Department:
<input type="text" id="dept" required><br><br>

<h4>Select Events</h4>
<input type="checkbox" name="event" value="Dance"> Dance<br>
<input type="checkbox" name="event" value="Coding"> Coding<br>
<input type="checkbox" name="event" value="Singing"> Singing<br><br>

Upload File:
<input type="file" required><br><br>

<input type="submit" value="Register">
<input type="reset">

</form>

<h3>Summary</h3>
<p id="summary"></p>

</body>
</html>

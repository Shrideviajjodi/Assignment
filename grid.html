<!DOCTYPE html>
<html>
<head>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    margin: 0;
    padding: 20px;
}

/* Grid */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
}

/* Card */
.card {
    background: white;
    border-radius: 10px;
    padding: 15px;
    text-align: center;
    box-shadow: 0 0 8px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* Image */
.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 8px;
}

/* Title */
.card h3 {
    margin: 10px 0 5px;
}

/* Price */
.price {
    color: green;
    font-weight: bold;
}

/* Button */
button {
    margin-top: 10px;
    padding: 8px 15px;
    border: none;
    background: #007bff;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #0056b3;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
    <img src="https://via.placeholder.com/200" alt="">
    <h3>Product 1</h3>
    <p class="price">₹100</p>
    <button>Add to Cart</button>
</div>

<div class="card">
    <img src="https://via.placeholder.com/200" alt="">
    <h3>Product 2</h3>
    <p class="price">₹200</p>
    <button>Add to Cart</button>
</div>

<div class="card">
    <img src="https://via.placeholder.com/200" alt="">
    <h3>Product 3</h3>
    <p class="price">₹300</p>
    <button>Add to Cart</button>
</div>

<div class="card">
    <img src="https://via.placeholder.com/200" alt="">
    <h3>Product 4</h3>
    <p class="price">₹400</p>
    <button>Add to Cart</button>
</div>

<div class="card">
    <img src="https://via.placeholder.com/200" alt="">
    <h3>Product 5</h3>
    <p class="price">₹500</p>
    <button>Add to Cart</button>
</div>

<div class="card">
    <img src="https://via.placeholder.com/200" alt="">
    <h3>Product 6</h3>
    <p class="price">₹600</p>
    <button>Add to Cart</button>
</div>

</div>

</body>
</html>

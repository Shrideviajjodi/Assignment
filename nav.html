<!DOCTYPE html>
<html>
<head>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* Navbar */
.nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #111;
    color: white;
    padding: 15px 40px;
}

.logo {
    font-size: 20px;
    font-weight: bold;
}

.menu a {
    margin-left: 20px;
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

.menu a:hover {
    color: #00adb5;
}

/* Hero Section */
.hero {
    text-align: center;
    padding: 80px 20px;
    background: #f5f5f5;
}

.hero h1 {
    font-size: 40px;
    margin-bottom: 20px;
}

button {
    padding: 12px 25px;
    border: none;
    background: #00adb5;
    color: white;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #007b80;
}

/* Responsive */
@media (max-width: 600px) {
    .nav {
        flex-direction: column;
        text-align: center;
    }

    .menu {
        margin-top: 10px;
    }
}
</style>
</head>

<body>

<div class="nav">
    <div class="logo">LOGO</div>

    <div class="menu">
        <a href="#">Home</a>
        <a href="#">About</a>
    </div>
</div>

<div class="hero">
    <h1>Welcome</h1>
    <p>Start building your modern website today</p>
    <button>Get Started</button>
</div>

</body>
</html>

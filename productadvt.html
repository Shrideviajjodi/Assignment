<!DOCTYPE html>
<html>
<head>
<style>
body {
    font-family: Arial;
    margin: 40px;
}

/* Product Name */
.name {
    text-align: center;
}

/* Price */
.price {
    text-align: right;
    font-weight: bold;
    margin-top: 10px;
}

/* Description */
.desc {
    text-align: justify;
    margin-top: 20px;
}

/* Button */
.btn {
    text-align: center;
    margin-top: 20px;
}

button {
    padding: 8px 15px;
}
</style>
</head>

<body>

<h1 class="name">Smart Watch</h1>

<p class="price">₹4999</p>

<p class="desc">
This smartwatch helps you track fitness, calls, and notifications.
It is stylish and easy to use.
</p>

<div class="btn">
<button>Buy Now</button>
</div>

</body>
</html>

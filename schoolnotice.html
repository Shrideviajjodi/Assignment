<!DOCTYPE html>
<html>
<head>
<style>
body {
    font-family: Arial;
    margin: 40px;
}

/* School Name */
.school {
    text-align: center;
}

/* Date */
.date {
    text-align: right;
    font-size: 14px;
}

/* Content */
.content {
    text-align: justify;
    margin-top: 20px;
}

/* Important Note */
.note {
    text-align: center;
    color: red;
    font-weight: bold;
    margin: 20px 0;
}

/* Footer */
.footer {
    margin-top: 30px;
}
</style>
</head>

<body>

<h1 class="school">ABC School</h1>

<p class="date">Date: 20 April 2026</p>

<p class="content">
All students are informed that the annual exams will start next week.
Prepare well and follow the schedule.
</p>

<p class="note">Important: Carry your ID card!</p>

<p class="footer">Principal</p>

</body>
</html>

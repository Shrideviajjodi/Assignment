<!DOCTYPE html>
<html>
<head>
<style>
table {
    width: 100%;
}

tr:nth-child(even) {
    background: lightgray;
}

tr:hover {
    background: yellow;
}
</style>
</head>
<body>

<table border="1">
<tr><th>Name</th><th>Marks</th></tr>
<tr><td>P</td><td>80</td></tr>
<tr><td>Q</td><td>85</td></tr>
<tr><td>R</td><td>90</td></tr>
<tr><td>S</td><td>75</td></tr>
<tr><td>T</td><td>88</td></tr>
<tr><td>U</td><td>92</td></tr>
</table>

</body>
</html>
